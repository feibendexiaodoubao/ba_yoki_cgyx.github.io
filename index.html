<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>积分统计</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    background:linear-gradient(135deg,#FFEAF4,#EAF7FF);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    width:900px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#ff78aa;
    margin-bottom:25px;
}

.top{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

input{
    flex:1;
    height:45px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#F7F7FB;
    padding:0 15px;
    font-size:16px;
}

button{
    border:none;
    cursor:pointer;
    transition:.2s;
    font-size:15px;
}

button:hover{
    transform:translateY(-2px);
}

.addBtn{
    background:#7AD7FF;
    color:white;
    padding:0 20px;
    border-radius:15px;
}

.settleBtn{
    margin-top:25px;
    width:100%;
    height:48px;
    background:#FF9FC5;
    color:white;
    border-radius:18px;
    font-size:18px;
}

.person{
    display:flex;
    align-items:flex-start;
    background:#FFF8FC;
    border-radius:18px;
    padding:15px;
    margin-bottom:15px;
}

.score{
    width:70px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
    margin-right:10px;
    color:#888;
}

.info{
    flex:1;
}

.name{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
    color:#555;
}

.actions{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.action-btn{
    padding:8px 14px;
    border-radius:12px;
    color:white;
}

.plus1{
    background:#82D173;
}

.minus1{
    background:#FFA0A0;
}

.plus2{
    background:#5DCBFF;
}

.minus2{
    background:#FFB56B;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.tag{
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-size:14px;
}

.tag.plus{
    background:#7BD77D;
}

.tag.minus{
    background:#FF8C8C;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 人员积分统计 🌸</h1>

<div class="top">
<input id="nameInput" placeholder="输入人员姓名">
<button class="addBtn" onclick="addPerson()">添加人员</button>
</div>

<div id="list"></div>

<button class="settleBtn" onclick="settle()">✨ 结算 ✨</button>

</div>

<script>

function addPerson(){

    const input=document.getElementById("nameInput");
    const name=input.value.trim();

    if(name===""){
        alert("请输入姓名");
        return;
    }

    const div=document.createElement("div");
    div.className="person";

    div.innerHTML=`
        <div class="score">0</div>

        <div class="info">

            <div class="name">${name}</div>

            <div class="actions">

                <button class="action-btn plus1" onclick="addTag(this,1)">+1</button>

                <button class="action-btn minus1" onclick="addTag(this,-1)">-1</button>

                <button class="action-btn plus2" onclick="addTag(this,2)">+2</button>

                <button class="action-btn minus2" onclick="addTag(this,-2)">-2</button>

            </div>

            <div class="tags"></div>

        </div>
    `;

    document.getElementById("list").appendChild(div);

    input.value="";
}

function addTag(btn,value){

    const person=btn.closest(".person");

    const tags=person.querySelector(".tags");

    const span=document.createElement("span");

    span.className=value>0?"tag plus":"tag minus";

    span.dataset.value=value;

    span.innerText=value>0?`+${value}`:`${value}`;

    tags.appendChild(span);

}

function settle(){

    const persons=document.querySelectorAll(".person");

    persons.forEach(person=>{

        let total=0;

        person.querySelectorAll(".tag").forEach(tag=>{

            total+=Number(tag.dataset.value);

        });

        const score=person.querySelector(".score");

        score.innerText=total;

        if(total>0){

            score.style.color="#29B35E";

        }else if(total<0){

            score.style.color="#E55353";

        }else{

            score.style.color="#999";

        }

    });

}

</script>

</body>
</html>
